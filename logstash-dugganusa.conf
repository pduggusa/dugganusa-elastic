# DugganUSA STIX Feed — Logstash Pipeline
# Alternative to Filebeat for environments already running Logstash.

input {
  http_poller {
    urls => {
      stix_feed => {
        method => get
        url => "https://analytics.dugganusa.com/api/v1/stix-feed"
        headers => {
          Accept => "application/json"
          # Authorization => "Bearer dugusa_YOUR_KEY_HERE"
        }
      }
    }
    schedule => { cron => "0 * * * *" }  # hourly
    codec => json
    metadata_target => "http_poller_metadata"
    tags => ["dugganusa", "stix", "threat-intel"]
  }
}

filter {
  if "dugganusa" in [tags] {
    split { field => "[objects]" }
    mutate {
      rename => { "[objects][type]" => "stix_type" }
      rename => { "[objects][id]" => "stix_id" }
      rename => { "[objects][name]" => "indicator_name" }
      rename => { "[objects][pattern]" => "indicator_pattern" }
      rename => { "[objects][created]" => "indicator_created" }
      rename => { "[objects][confidence]" => "indicator_confidence" }
      add_field => { "threat_feed" => "DugganUSA" }
    }
    if [stix_type] != "indicator" { drop {} }
  }
}

output {
  if "dugganusa" in [tags] {
    elasticsearch {
      hosts => ["localhost:9200"]
      index => "dugganusa-threat-intel-%{+YYYY.MM.dd}"
      # user => "elastic"
      # password => "changeme"
    }
  }
}
